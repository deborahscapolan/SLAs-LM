<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SLA Last Mile — Simulador</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;font-family:system-ui,sans-serif;color:#f1f5f9}
  select{background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:6px;padding:6px 10px;font-size:13px;outline:none;width:100%}
  input[type=range]{accent-color:#38bdf8;width:100%}
  table{width:100%;border-collapse:collapse}
  th{color:#94a3b8;font-size:11px;font-weight:600;text-align:left;padding:6px 10px;border-bottom:1px solid #334155}
  td{font-size:12px;padding:7px 10px;border-bottom:1px solid #33415533}
  tr:nth-child(even){background:#ffffff08}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1e293b}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect} = React;
const C = {bg:"#0f172a",card:"#1e293b",border:"#334155",accent:"#38bdf8",green:"#4ade80",yellow:"#fbbf24",red:"#f87171",muted:"#94a3b8",white:"#f1f5f9",purple:"#a78bfa",orange:"#fb923c"};

// ── CONFIG ─────────────────────────────────────────────────────
const SHEET_ID = "1uUEQbeKq5z2aJjO85b-k2HHz_a3QiFTH8LWTcg6BWq4";
const sheetUrl = (aba) =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(aba)}`;

// Converte resposta gviz para array de objetos
function parseGviz(raw) {
  const json = JSON.parse(raw.replace(/^[^{]+/, "").replace(/[^}]+$/, ""));
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => { obj[cols[i]] = cell ? cell.v : null; });
    return obj;
  });
}

const toMes = p => p ? String(p).slice(0, 6) : "";
const brl = v => "R$ " + (v || 0).toLocaleString("pt-BR", {minimumFractionDigits:0,maximumFractionDigits:0});
const pct = (a, b) => b ? ((a/b)*100).toFixed(1)+"%" : "-";
const pctFmt = v => (v||0).toFixed(1)+"%";

// ── COMPONENTES ────────────────────────────────────────────────
const KPI = ({label,value,sub,color})=>(
  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",flex:1,minWidth:130}}>
    <div style={{color:C.muted,fontSize:11,marginBottom:4}}>{label}</div>
    <div style={{color:color||C.white,fontSize:20,fontWeight:700}}>{value}</div>
    {sub&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>{sub}</div>}
  </div>
);

const Tag = ({v})=>{
  const c = v>=90?C.green:v>=70?C.yellow:C.red;
  return <span style={{background:c+"22",color:c,borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:600}}>{(v||0).toFixed(1)}%</span>;
};

const Sel = ({label,value,onChange,options})=>(
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <label style={{color:C.muted,fontSize:11}}>{label}</label>
    <select value={value} onChange={e=>onChange(e.target.value)}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Slide = ({label,value,onChange,min,max,step=1})=>(
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <label style={{color:C.muted,fontSize:11}}>{label} <span style={{color:C.accent,fontWeight:700}}>{value}%</span></label>
    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(+e.target.value)}/>
    <div style={{display:"flex",justifyContent:"space-between",color:C.muted,fontSize:10}}><span>{min}%</span><span>{max}%</span></div>
  </div>
);

// ── APP ────────────────────────────────────────────────────────
function App(){
  const [rawDesc, setRawDesc] = useState([]);
  const [rawRotas, setRawRotas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [erro, setErro] = useState(null);

  const [fSite,setFSite]=useState("ALL");
  const [fCo,setFCo]=useState("ALL");
  const [fHub,setFHub]=useState("ALL");
  const [fMes,setFMes]=useState("ALL");
  const [thr,setThr]=useState(70);
  const [pctC,setPctC]=useState(30);

  // Carrega dados do Google Sheets
  useEffect(()=>{
    const fetchSheet = (aba) =>
      fetch(sheetUrl(aba))
        .then(r => r.text())
        .then(parseGviz);

    Promise.all([fetchSheet("descontos"), fetchSheet("rotas")])
      .then(([desc, rotas]) => {
        setRawDesc(desc);
        setRawRotas(rotas);
        setLoading(false);
      })
      .catch(e => { setErro(e.message); setLoading(false); });
  }, []);

  // Opções de filtro
  const sites  = ["ALL", ...new Set(rawRotas.map(r=>r.SHP_SITE_ID).filter(Boolean))];
  const cos    = ["ALL", ...new Set(rawRotas.map(r=>r.SHP_COMPANY_NAME).filter(Boolean))];
  const hubs   = ["ALL", ...new Set(rawRotas.map(r=>r.HUB).filter(Boolean))];
  const meses  = ["ALL", ...new Set(rawRotas.map(r=>r.ANO_ROTA_CUSTO).filter(Boolean))].sort();

  // Mapa de descontos
  const descMap = useMemo(()=>{
    const m={};
    rawDesc.forEach(d=>{
      const mes = toMes(d.SHP_LG_PRE_INVOICE_HEADER_PERIOD_NAME);
      const k = [d.SIT_SITE_ID, d.SHP_COMPANY_NAME, d.SHP_LG_ROUTE_FACILITY_ID, mes].join("|");
      m[k] = (m[k]||0) + (d.SHP_LG_PRE_INVOICE_DETAIL_COST||0);
    });
    return m;
  }, [rawDesc]);

  // JOIN + lógica de simulação
  const joined = useMemo(()=>{
    return rawRotas.map(r=>{
      const k = [r.SHP_SITE_ID, r.SHP_COMPANY_NAME, r.HUB, r.ANO_ROTA_CUSTO].join("|");
      const descReal = descMap[k]||0;
      const custo = r.CUSTO||0;
      const pv = r.Stops_Plan>0 ? (r.Stops_Real/r.Stops_Plan)*100 : 0;
      const ok = pv>=90;
      const faixa = !ok && pv>=thr;
      const descontoSim = faixa ? custo*(1-pctC/100) : (ok ? 0 : custo);
      const custoPagoSim = faixa ? custo*(pctC/100) : (ok ? custo : 0);
      return {
        SITE: r.SHP_SITE_ID, COMPANY: r.SHP_COMPANY_NAME, HUB: r.HUB,
        ANO_MES: r.ANO_ROTA_CUSTO, QTD_ROTAS: r.QTD_ROTAS||0,
        CUSTO: custo, STOPS_PLAN: r.Stops_Plan||0, STOPS_REAL: r.Stops_Real||0,
        DESCONTO_REAL: descReal, PCT: pv, OK: ok, FAIXA: faixa,
        DESCONTO_SIM: descontoSim, CUSTO_PAGO_SIM: custoPagoSim
      };
    }).filter(r=>
      (fSite==="ALL"||r.SITE===fSite)&&
      (fCo==="ALL"||r.COMPANY===fCo)&&
      (fHub==="ALL"||r.HUB===fHub)&&
      (fMes==="ALL"||r.ANO_MES===fMes)
    );
  }, [rawRotas, descMap, fSite, fCo, fHub, fMes, thr, pctC]);

  // Totais
  const totRotas    = joined.reduce((s,r)=>s+r.QTD_ROTAS,0);
  const totFaturado = joined.reduce((s,r)=>s+r.CUSTO,0);
  const totDescReal = joined.reduce((s,r)=>s+r.DESCONTO_REAL,0);
  const totDescSim  = joined.reduce((s,r)=>s+r.DESCONTO_SIM,0);
  const totCustoPago= joined.reduce((s,r)=>s+r.CUSTO_PAGO_SIM,0);
  const rotasOk     = joined.filter(r=>r.OK).reduce((s,r)=>s+r.QTD_ROTAS,0);
  const rotasFaixa  = joined.filter(r=>r.FAIXA).reduce((s,r)=>s+r.QTD_ROTAS,0);

  // Por mês + país
  const byMes = useMemo(()=>{
    const m={};
    joined.forEach(r=>{
      const k=r.ANO_MES+"|"+r.SITE;
      if(!m[k])m[k]={MES:r.ANO_MES,SITE:r.SITE,FATURADO:0,DESC_REAL:0,DESC_SIM:0,CUSTO_PAGO:0,ROT_OK:0,ROT_F:0,ROT_ZERO:0,TOT:0};
      m[k].FATURADO+=r.CUSTO; m[k].DESC_REAL+=r.DESCONTO_REAL; m[k].DESC_SIM+=r.DESCONTO_SIM;
      m[k].CUSTO_PAGO+=r.CUSTO_PAGO_SIM; m[k].TOT+=r.QTD_ROTAS;
      if(r.OK)m[k].ROT_OK+=r.QTD_ROTAS;
      if(r.FAIXA)m[k].ROT_F+=r.QTD_ROTAS;
      if(!r.OK&&!r.FAIXA)m[k].ROT_ZERO+=r.QTD_ROTAS;
    });
    return Object.values(m).sort((a,b)=>a.MES.localeCompare(b.MES)||a.SITE.localeCompare(b.SITE));
  },[joined]);

  // Por transportador
  const byMLP = useMemo(()=>{
    const m={};
    joined.forEach(r=>{
      const k=r.COMPANY;
      if(!m[k])m[k]={SITE:r.SITE,COMPANY:r.COMPANY,FATURADO:0,DESC_REAL:0,DESC_SIM:0,ROT_OK:0,ROT_F:0,TOT_ROTAS:0};
      m[k].FATURADO+=r.CUSTO; m[k].DESC_REAL+=r.DESCONTO_REAL; m[k].DESC_SIM+=r.DESCONTO_SIM;
      m[k].TOT_ROTAS+=r.QTD_ROTAS;
      if(r.OK)m[k].ROT_OK+=r.QTD_ROTAS;
      if(r.FAIXA)m[k].ROT_F+=r.QTD_ROTAS;
    });
    Object.values(m).forEach(v=>{ v.PRECO_MEDIO = v.TOT_ROTAS>0 ? v.FATURADO/v.TOT_ROTAS : 0; });
    return Object.values(m);
  },[joined]);

  const card={background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:16};
  const sec={marginBottom:24};
  const secT={color:C.accent,fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12};

  if(loading) return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:48,height:48,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{color:C.muted,fontSize:14}}>Carregando dados do Google Sheets...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(erro) return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{...card,maxWidth:500,textAlign:"center"}}>
        <div style={{color:C.red,fontSize:24,marginBottom:12}}>❌</div>
        <div style={{color:C.white,fontWeight:700,marginBottom:8}}>Erro ao carregar dados</div>
        <div style={{color:C.muted,fontSize:13,marginBottom:16}}>{erro}</div>
        <div style={{color:C.muted,fontSize:12}}>Verifique se a planilha está compartilhada como <strong style={{color:C.yellow}}>"Qualquer pessoa com o link"</strong></div>
      </div>
    </div>
  );

  return(
    <div style={{background:C.bg,minHeight:"100vh",padding:"20px 24px"}}>

      {/* HEADER */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:20,fontWeight:800}}>📦 SLA Last Mile — Simulador de Cenários</div>
        <div style={{color:C.muted,fontSize:12,marginTop:2}}>Análise de impacto de mudança de regra de pagamento de rotas</div>
        <div style={{marginTop:6,background:"#4ade8022",border:"1px solid #4ade8044",borderRadius:6,padding:"6px 12px",fontSize:11,color:C.green,display:"inline-block"}}>
          ✅ Conectado ao Google Sheets — dados em tempo real
        </div>
      </div>

      {/* FILTROS */}
      <div style={{...card,marginBottom:20}}>
        <div style={secT}>🔽 Filtros</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
          <Sel label="País (Site)" value={fSite} onChange={setFSite} options={sites.map(v=>({value:v,label:v==="ALL"?"Todos":v}))}/>
          <Sel label="Transportador" value={fCo} onChange={setFCo} options={cos.map(v=>({value:v,label:v==="ALL"?"Todos":v}))}/>
          <Sel label="Facility (HUB)" value={fHub} onChange={setFHub} options={hubs.map(v=>({value:v,label:v==="ALL"?"Todos":v}))}/>
          <Sel label="Mês" value={fMes} onChange={setFMes} options={meses.map(v=>({value:v,label:v==="ALL"?"Todos":v}))}/>
        </div>
      </div>

      {/* PARÂMETROS */}
      <div style={{...card,marginBottom:20,borderColor:C.accent+"55"}}>
        <div style={secT}>⚙️ Parâmetros do Cenário Simulado</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
          <Slide label="Threshold mínimo para pagamento parcial" value={thr} onChange={setThr} min={0} max={89}/>
          <Slide label="% de custo pago ao transportador na faixa" value={pctC} onChange={setPctC} min={5} max={100} step={5}/>
        </div>
        <div style={{marginTop:12,background:C.bg,borderRadius:6,padding:"8px 12px",fontSize:12,color:C.muted}}>
          📌 Rotas com <span style={{color:C.yellow,fontWeight:700}}>{thr}% ≤ visitas &lt; 90%</span>: pagamos <span style={{color:C.green,fontWeight:700}}>{pctC}%</span> ao transportador → descontamos <span style={{color:C.red,fontWeight:700}}>{100-pctC}%</span> (antes descontávamos 100%)
        </div>
      </div>

      {/* AS IS */}
      <div style={sec}>
        <div style={secT}>📊 Situação Atual (AS IS)</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <KPI label="Total Rotas" value={totRotas.toLocaleString("pt-BR")}/>
          <KPI label="Valor Faturado" value={brl(totFaturado)} color={C.accent}/>
          <KPI label="Rotas ≥90% visitados" value={rotasOk.toLocaleString("pt-BR")} color={C.green} sub={pct(rotasOk,totRotas)+" do total"}/>
          <KPI label="Valor Descontado Real" value={brl(totDescReal)} color={C.red}/>
          <KPI label="% Desconto Real" value={totFaturado>0?pctFmt(totDescReal/totFaturado*100):"-"} color={C.red}/>
        </div>
      </div>

      {/* SIMULADO */}
      <div style={sec}>
        <div style={secT}>⚙️ Cenário Simulado</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <KPI label="Total Rotas" value={totRotas.toLocaleString("pt-BR")}/>
          <KPI label="Valor Faturado" value={brl(totFaturado)} color={C.accent}/>
          <KPI label="Threshold Simulado" value={`${thr}% ~ 90%`} color={C.yellow}/>
          <KPI label="Rotas no Range Selecionado" value={rotasFaixa.toLocaleString("pt-BR")} color={C.yellow} sub={pct(rotasFaixa,totRotas)+" do total"}/>
          <KPI label="% Custo Pago" value={pctFmt(pctC)} color={C.orange}/>
          <KPI label="Valor Simulado Desconto" value={brl(totDescSim)} color={C.purple}/>
          <KPI label="% Desconto Simulado" value={totFaturado>0?pctFmt(totDescSim/totFaturado*100):"-"} color={C.purple}/>
        </div>
      </div>

      {/* POR MÊS */}
      <div style={sec}>
        <div style={secT}>📅 Gasto por Mês</div>
        <div style={{...card,overflowX:"auto"}}>
          <table>
            <thead><tr>
              {["Mês","País","Total Rotas","Valor Faturado","Rotas ≥90%",`Rotas Simulado (≥${thr}%)`, "Valor Descontado Real","Valor Simulado Desconto","% Desconto Real","% Desconto Simulado"].map(h=><th key={h}>{h}</th>)}
            </tr></thead>
            <tbody>
              {byMes.map((m,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:700}}>{m.MES}</td>
                  <td>{m.SITE}</td>
                  <td>{m.TOT.toLocaleString("pt-BR")}</td>
                  <td style={{color:C.accent}}>{brl(m.FATURADO)}</td>
                  <td style={{color:C.green}}>{m.ROT_OK}</td>
                  <td style={{color:C.yellow}}>{m.ROT_F}</td>
                  <td style={{color:C.red}}>{brl(m.DESC_REAL)}</td>
                  <td style={{color:C.purple}}>{brl(m.DESC_SIM)}</td>
                  <td style={{color:C.red}}>{m.FATURADO>0?pctFmt(m.DESC_REAL/m.FATURADO*100):"-"}</td>
                  <td style={{color:C.purple}}>{m.FATURADO>0?pctFmt(m.DESC_SIM/m.FATURADO*100):"-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* POR TRANSPORTADOR */}
      <div style={sec}>
        <div style={secT}>🌎 Comparativo por Transportador (MLP)</div>
        <div style={{...card,overflowX:"auto"}}>
          <table>
            <thead><tr>
              {["País","Transportadora","Total Rotas","Preço Médio/Rota","Valor Faturado",`Rotas ≥90%`,`Rotas <90% ≥${thr}%`,"Valor Descontado Real","Valor Simulado Desconto","% Desconto Real","% Desconto Simulado"].map(h=><th key={h}>{h}</th>)}
            </tr></thead>
            <tbody>
              {byMLP.map((m,i)=>(
                <tr key={i}>
                  <td>{m.SITE}</td>
                  <td style={{fontWeight:600}}>{m.COMPANY}</td>
                  <td>{m.TOT_ROTAS.toLocaleString("pt-BR")}</td>
                  <td style={{color:C.accent}}>{brl(m.PRECO_MEDIO)}</td>
                  <td style={{color:C.accent}}>{brl(m.FATURADO)}</td>
                  <td style={{color:C.green}}>{m.ROT_OK}</td>
                  <td style={{color:C.yellow}}>{m.ROT_F}</td>
                  <td style={{color:C.red}}>{brl(m.DESC_REAL)}</td>
                  <td style={{color:C.purple}}>{brl(m.DESC_SIM)}</td>
                  <td style={{color:C.red}}>{m.FATURADO>0?pctFmt(m.DESC_REAL/m.FATURADO*100):"-"}</td>
                  <td style={{color:C.purple}}>{m.FATURADO>0?pctFmt(m.DESC_SIM/m.FATURADO*100):"-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* DETALHE */}
      <div style={sec}>
        <div style={secT}>📋 Detalhe por Linha</div>
        <div style={{...card,overflowX:"auto"}}>
          <table>
            <thead><tr>
              {["Site","Transportador","HUB","Mês","Rotas","Stops Plan","Stops Real","% Visita","Faturado","Desconto Real","Desconto Simulado","Custo Pago Simulado"].map(h=><th key={h}>{h}</th>)}
            </tr></thead>
            <tbody>
              {joined.map((r,i)=>(
                <tr key={i}>
                  <td>{r.SITE}</td>
                  <td>{r.COMPANY}</td>
                  <td>{r.HUB}</td>
                  <td>{r.ANO_MES}</td>
                  <td>{r.QTD_ROTAS}</td>
                  <td>{(r.STOPS_PLAN||0).toLocaleString("pt-BR")}</td>
                  <td>{(r.STOPS_REAL||0).toLocaleString("pt-BR")}</td>
                  <td><Tag v={r.PCT}/></td>
                  <td style={{color:C.accent}}>{brl(r.CUSTO)}</td>
                  <td style={{color:C.red}}>{brl(r.DESCONTO_REAL)}</td>
                  <td style={{color:C.purple}}>{(r.FAIXA||!r.OK)?brl(r.DESCONTO_SIM):"-"}</td>
                  <td style={{color:C.orange}}>{r.FAIXA?brl(r.CUSTO_PAGO_SIM):"-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{color:C.muted,fontSize:11,textAlign:"center",paddingTop:12,paddingBottom:20}}>
        Dados carregados do Google Sheets em tempo real • SLA Last Mile Simulador
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
